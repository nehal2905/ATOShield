name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ml-backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ml + backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
          pip install -r backend/requirements.txt
          pip install ruff
      - name: Lint (ruff)
        run: ruff check ml backend || true
      - name: Train tiny model for tests
        run: |
          cd ml
          python generate_dataset.py --normal 1500 --users 40 --attacks 200
          python train.py
          python evaluate.py
      - name: Backend + ML tests
        env:
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci_test_secret_not_for_prod
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          ML_ARTIFACTS_DIR: ${{ github.workspace }}/ml/artifacts
        run: |
          pytest ml/tests backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm install
      - run: npm run lint --if-present
      - run: npm run test --if-present
      - run: npm run build
